port: 8080
swagger_enabled: true
auto_open_browser: false

swagger_url: /swagger/index.html
swagger_doc_url: /swagger/doc.json

db_list:
  default_db_name: test
  connect_list:
    - name: test
      db_type: sqlite
      db_path: ./data/test.db
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime: 30

# Example for another database:
#    - name: analytics_db
#      db_type: postgres
#      db_path: host=127.0.0.1 port=5432 user=admin password=secret dbname=analytics sslmode=disable
#      max_open_conns: 50

mqtt:
  broker_url: ""
  client_id: nexus-core-control
  username: ""
  password: ""
  publish_timeout_seconds: 5
