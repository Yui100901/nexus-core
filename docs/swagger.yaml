      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Delete expired licenses
      tags:
      - licenses
  /license-keys/{key}:
    get:
      consumes:
      - application/json
      parameters:
      - description: License Key
        in: query
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
