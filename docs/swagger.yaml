        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Create a control command
      tags:
      - control-commands
  /control-commands/{id}:
    get:
      consumes:
