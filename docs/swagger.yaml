basePath: /
definitions:
  api.CommonResponse:
    properties:
      code:
        description: 业务状态码
        type: integer
      data:
        description: 响应数据，可选
      message:
        description: 响应消息
        type: string
    type: object
  dto.AddBindingCommand:
    properties:
      license_id:
        type: integer
      node_id:
        type: integer
    required:
    - license_id
    - node_id
    type: object
  dto.BatchCreateLicenseCommand:
    properties:
      count:
        type: integer
      max_concurrent:
        type: integer
      max_nodes:
        type: integer
      product_id:
        type: integer
      remark:
        type: string
      validity_hours:
        type: integer
    required:
    - count
    - product_id
    - validity_hours
    type: object
  dto.CreateControlCommand:
    properties:
      node_id:
        type: integer
      payload:
        type: object
      service_identifier:
        type: string
    required:
    - node_id
    - payload
    - service_identifier
    type: object
  dto.CreateControlServiceCommand:
    properties:
      description:
        type: string
      identifier:
        type: string
      input_schema:
        type: object
      name:
        type: string
      output_schema:
        type: object
      product_id:
        type: integer
      service_type:
        type: string
    required:
    - identifier
    - name
    - service_type
    type: object
  dto.CreateLicenseCommand:
    description: Command to create a license
    properties:
      max_concurrent:
        description: 并发限制
        type: integer
      max_nodes:
        description: 最大节点数
        type: integer
      product_id:
        description: 授权范围列表
        type: integer
      remark:
        description: 备注
        type: string
      validity_hours:
        description: 有效时长（小时）
        type: integer
    required:
    - product_id
    - validity_hours
    type: object
  dto.CreateNodeCommand:
    properties:
      device_code:
        type: string
      metadata:
        type: string
    required:
    - device_code
    type: object
  dto.CreateProductCommand:
    description: Command to create a product
    properties:
      description:
        description: 产品描述
        type: string
      name:
        description: 产品名称
        type: string
    required:
    - name
    type: object
  dto.CreateProductVersionCommand:
    description: Product version DTO
    properties:
      description:
        description: 版本描述
        type: string
      product_id:
        description: 所属产品ID
        type: integer
      release_date:
        description: 发布时间
        type: string
      release_method:
        allOf:
        - $ref: '#/definitions/dto.ReleaseMethod'
        description: 0立即发布，1定时发布，2暂不发布
      version_code:
        description: 版本号
        type: string
    required:
    - product_id
    - version_code
    type: object
  dto.DeprecateVersionCommand:
    properties:
      product_id:
        type: integer
      version_id:
        type: integer
    required:
    - product_id
    - version_id
    type: object
  dto.HeartbeatCommand:
    description: Heartbeat payload from client containing device and license info
    properties:
      device_code:
        description: 设备唯一识别码
        type: string
      license_key:
        description: 许可证
        type: string
      product_id:
        description: 产品ID
        type: integer
      version_code:
        description: 产品版本号
        type: string
    required:
    - device_code
    - license_key
    - product_id
    - version_code
    type: object
  dto.RegisterCommand:
    properties:
      device_code:
        description: 设备唯一识别码
        type: string
      license_key:
        description: 许可证
        type: string
      product_id:
        description: 产品ID
        type: integer
      version_code:
        description: 产品版本号
        type: string
    required:
    - device_code
    - license_key
    - product_id
    - version_code
    type: object
  dto.ReleaseMethod:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      ReleaseHold: 2 暂不发布
      ReleaseImmediate: 0 立即发布
      ReleaseScheduled: 1 定时发布
    x-enum-descriptions:
    - 0 立即发布
    - 1 定时发布
    - 2 暂不发布
    x-enum-varnames:
    - ReleaseImmediate
    - ReleaseScheduled
    - ReleaseHold
  dto.ReleaseNewVersionCommand:
    properties:
      product_id:
        description: 所属产品ID
        type: integer
      release_date:
        description: 发布时间
        type: string
      version_id:
        description: 版本ID
        type: integer
    required:
    - product_id
    - version_id
    type: object
  dto.ReportNodeCapabilityCommand:
    properties:
      endpoint:
        type: string
      node_id:
        type: integer
      protocol:
        type: string
      schema:
        type: object
      service_identifier:
        type: string
    required:
    - node_id
    - protocol
    - schema
    - service_identifier
    type: object
  dto.UnbindCommand:
    properties:
      license_id:
        type: integer
      node_id:
        type: integer
    required:
    - license_id
    - node_id
    type: object
  dto.UpdateLicenseCommand:
    description: Command to update a license
    properties:
      feature_mask:
        type: string
      id:
        description: 许可证ID
        type: integer
      max_concurrent:
        type: integer
      max_nodes:
        type: integer
      remark:
        description: 备注
        type: string
    type: object
  dto.UpdateLicenseStatusCommand:
    properties:
      id:
        description: 许可证ID
        type: integer
    required:
    - id
    type: object
  dto.UpdateMinVersionCommand:
    description: Command to update min supported version
    properties:
      product_id:
        description: 产品ID
        type: integer
      version_id:
        description: 版本ID
        type: integer
    required:
    - product_id
    - version_id
    type: object
  dto.UpdateNodeCommand:
    properties:
      device_code:
        type: string
      id:
        type: integer
      metadata:
        type: string
    type: object
  dto.UpdateProductCommand:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  entity.BindingStatus:
    enum:
    - 0
    - 1
    type: integer
    x-enum-comments:
      BindingStatusBound: 1 绑定
      BindingStatusUnbound: 0 未绑定
    x-enum-descriptions:
    - 0 未绑定
    - 1 绑定
    x-enum-varnames:
    - BindingStatusUnbound
    - BindingStatusBound
  entity.Node:
    properties:
      deviceCode:
        description: 设备唯一识别码，用于区分不同设备
        type: string
      id:
        description: 节点唯一标识符
        type: integer
      metadata:
        description: 设备元信息，包含操作系统、版本等信息
        type: string
      status:
        description: 是否被封禁，0 = 未封禁，1 = 已封禁
        type: integer
    type: object
  entity.NodeLicenseBinding:
    properties:
      id:
        description: 绑定关系唯一标识符
        type: integer
      licenseID:
        description: 关联的许可证ID，指向License实体
        type: integer
      nodeID:
        description: 绑定的节点ID，指向Node实体
        type: integer
      productID:
        description: 关联的产品ID，指向Product实体
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/entity.BindingStatus'
        description: 绑定状态，表示当前绑定的状态
    type: object
  entity.Product:
    properties:
      description:
        description: 产品详细描述
        type: string
      id:
        description: 产品唯一标识符
        type: integer
      minSupportedVersionID:
        description: 最低支持的版本ID，用于版本兼容性检查，按时间，在此之前发布的版本将无法使用
        type: integer
      name:
        description: 产品名称，具有唯一性
        type: string
      versionList:
        description: 产品版本列表
        items:
          $ref: '#/definitions/entity.Version'
        type: array
    type: object
  entity.Version:
    properties:
      description:
        description: 版本详细说明
        type: string
      id:
        type: integer
      releaseDate:
        description: 版本发布时间
        type: string
      status:
        description: 版本状态，用于标识版本是否可用
        type: integer
      versionCode:
        description: 版本号，遵循语义化版本规范
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 简易个人订阅制软件管理平台 API
  title: Nexus Core API
  version: 0.0.1
paths:
  /access/heartbeat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Heartbeat
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.HeartbeatCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Client heartbeat
      tags:
      - access
  /access/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
