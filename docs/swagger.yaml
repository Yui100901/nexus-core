  /licenses/batch:
    post:
      consumes:
      - application/json
      parameters:
      - description: Batch Create Licenses
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.BatchCreateLicenseCommand'
      produces:
