    get:
      consumes:
      - application/json
      parameters:
      - description: License ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Get license by ID
      tags:
      - licenses
    patch:
      consumes:
      - application/json
      parameters:
      - description: Update License
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLicenseCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Update license
      tags:
      - licenses
  /licenses/{id}/bindings:
    delete:
      consumes:
      - application/json
      parameters:
      - description: CleanLicenseBindings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLicenseCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Remove all node bindings of a license
      tags:
      - licenses
  /licenses/{id}/renew:
    post:
      consumes:
      - application/json
      parameters:
      - description: renew License
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLicenseCommand'
      produces:
