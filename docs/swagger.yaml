            $ref: '#/definitions/api.CommonResponse'
      summary: Batch create licenses
      tags:
      - licenses
  /node-bindings:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Update binding status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UnbindCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Update binding status
      tags:
      - nodes
    post:
      consumes:
      - application/json
      parameters:
      - description: Add Binding
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AddBindingCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.NodeLicenseBinding'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Add node binding
      tags:
      - nodes
  /node-capabilities:
    get:
      consumes:
      - application/json
      parameters:
      - description: Node ID
        in: query
        name: node_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: List node capabilities
      tags:
      - node-capabilities
    post:
      consumes:
      - application/json
      parameters:
      - description: Report Node Capability
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ReportNodeCapabilityCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Report node capability
      tags:
      - node-capabilities
  /node-cleanups/unbound:
    delete:
      consumes:
      - application/json
      parameters:
      - description: '{\'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
