      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Delete expired licenses
      tags:
