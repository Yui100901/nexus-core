            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Get a control command
      tags:
      - control-commands
  /control-services:
    get:
      consumes:
      - application/json
      parameters:
      - description: Product ID
        in: query
        name: product_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: List control services
      tags:
      - control-services
    post:
      consumes:
      - application/json
      parameters:
      - description: Create Control Service
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateControlServiceCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
      summary: Create a control service
      tags:
      - control-services
  /control-services/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Control Service ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.CommonResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.CommonResponse'
